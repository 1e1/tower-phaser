<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Duel — the maker's notebook</title>
    <meta name="description" content="An illustrated tutorial to understand how a video game that runs in a browser is built, using the game Tower Duel. Available in English, French, German, Spanish and Italian." />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <!-- No-JS fallback: send visitors to the English edition after a moment. -->
    <meta http-equiv="refresh" content="3; url=en/index.html" />
    <script>
      // Route to the reader's language if we have it, otherwise English.
      (function () {
        var supported = ['en', 'fr', 'de', 'es', 'it'];
        var prefs = (navigator.languages && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || 'en'];
        var pick = 'en';
        for (var i = 0; i < prefs.length; i++) {
          var code = String(prefs[i]).slice(0, 2).toLowerCase();
          if (supported.indexOf(code) !== -1) { pick = code; break; }
        }
        location.replace(pick + '/index.html');
      })();
    </script>
    <style>
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(180deg, #6fb7ff, #cfeeff); color: #2b2535; text-align: center;
      }
      .card { padding: 32px 28px; }
      h1 { font-family: 'Fredoka', 'Nunito', system-ui, sans-serif; margin: 0 0 6px; }
      .langs { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
      .langs a {
        text-decoration: none; background: #fff; color: #2b2535; font-weight: 800;
        border-radius: 12px; padding: 10px 18px; box-shadow: 0 8px 22px rgba(35,25,50,0.18);
      }
      .langs a:hover { color: #3a6df0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Tower Duel<span style="color:#3a6df0">.</span> — the maker's notebook</h1>
      <p>Taking you to your language… Choose one below if nothing happens:</p>
      <nav class="langs">
        <a href="en/index.html">English</a>
        <a href="fr/index.html">Français</a>
        <a href="de/index.html">Deutsch</a>
        <a href="es/index.html">Español</a>
        <a href="it/index.html">Italiano</a>
      </nav>
    </div>
  </body>
</html>
