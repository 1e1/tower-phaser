<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fb7ff"/>
      <stop offset="1" stop-color="#cfeeff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#sky)"/>
  <!-- hills -->
  <path d="M0 50 C16 41 26 54 40 47 C50 42 58 50 64 46 L64 64 L0 64 Z" fill="#3f8f2f"/>
  <path d="M0 56 C18 49 30 60 44 55 C54 51 60 58 64 55 L64 64 L0 64 Z" fill="#2f6f22"/>
  <!-- tower -->
  <rect x="9" y="33" width="11" height="19" rx="2" fill="#2b2535"/>
  <rect x="7" y="30" width="15" height="5" rx="2" fill="#2b2535"/>
  <!-- hand-sketched trajectory (dots gently march toward the target) -->
  <path d="M14 31 C24 12 36 12 46 28" fill="none" stroke="#2b2535" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="1.5 4.5">
    <animate attributeName="stroke-dashoffset" values="0;-6" dur="0.9s" calcMode="linear" repeatCount="indefinite"/>
  </path>
  <circle cx="20" cy="20" r="4" fill="#ff8c42" stroke="#d8552f" stroke-width="1.5"/>
  <!-- pencil (learning / making): rests drawing at the arc's end; when rendered live it
       sweeps the trajectory and back. Base transform keeps the static favicon polished. -->
  <g transform="translate(46 28)">
    <animateTransform attributeName="transform" type="translate" additive="replace"
      dur="3.6s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"
      values="46 28; 38.2 19; 30 16.4; 21.8 20.3; 14 31; 21.8 20.3; 30 16.4; 38.2 19; 46 28"/>
    <g transform="rotate(-40)">
      <rect x="-3" y="-20" width="6" height="14" fill="#f7c948"/>
      <rect x="-3" y="-20" width="6" height="3" fill="#e8a020"/>
      <rect x="-2.5" y="-24" width="5" height="4.5" rx="1.6" fill="#ff7eb6"/>
      <path d="M-3 -6 L3 -6 L0 0 Z" fill="#f3e3c0"/>
      <path d="M-1.3 -3.4 L1.3 -3.4 L0 0 Z" fill="#2b2535"/>
    </g>
  </g>
</svg>
