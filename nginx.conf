server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: always fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
