name: Release server bundle

# On every version tag (v1.2.3), build the lean copy-paste server bundle
# (zip + tar.gz) and attach both to the GitHub Release, alongside the Docker
# image published by docker-release.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the copy-paste server bundle (zip + tar.gz)
        run: npm run package

      - name: Attach bundles to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.tar.gz
