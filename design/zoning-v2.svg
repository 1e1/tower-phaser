<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1000" height="720" fill="#f5f6f8"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#1f2733">v2.0.0 — zoning: TV spectator + phone controllers</text>
  <text x="40" y="66" font-size="13" fill="#657180" font-style="italic">A Node server runs the authoritative simulation; the TV renders it, phones send the orders.</text>

  <!-- ===================== TV ===================== -->
  <rect x="40" y="100" width="430" height="300" rx="10" fill="#0e1726" stroke="#33415a" stroke-width="3"/>
  <!-- sky/terrain inside TV -->
  <rect x="52" y="112" width="406" height="200" rx="4" fill="#16314a"/>
  <path d="M52 296 Q150 240 250 270 T458 262 L458 312 L52 312 Z" fill="#244b34"/>
  <rect x="96" y="244" width="26" height="68" fill="#6b4a2e"/>
  <rect x="388" y="240" width="26" height="72" fill="#6b4a2e"/>
  <path d="M122 240 Q255 170 388 236" fill="none" stroke="#e0533a" stroke-width="2.5" stroke-dasharray="6 5"/>
  <!-- soldiers (living battlefield) -->
  <circle cx="200" cy="290" r="4" fill="#4aa3ff"/>
  <circle cx="220" cy="288" r="4" fill="#4aa3ff"/>
  <circle cx="300" cy="286" r="4" fill="#ff5d5d"/>
  <!-- room code + QR badge -->
  <rect x="360" y="120" width="92" height="56" rx="6" fill="#ffffff" opacity="0.95"/>
  <rect x="366" y="126" width="38" height="38" fill="#0e1726"/>
  <rect x="372" y="132" width="8" height="8" fill="#fff"/><rect x="390" y="132" width="8" height="8" fill="#fff"/>
  <rect x="372" y="150" width="8" height="8" fill="#fff"/><rect x="384" y="144" width="8" height="8" fill="#fff"/>
  <text x="430" y="140" font-size="11" font-weight="700" fill="#0e1726" text-anchor="middle">ROOM</text>
  <text x="430" y="158" font-size="15" font-weight="800" fill="#0e1726" text-anchor="middle">7KQ2</text>
  <text x="60" y="340" font-size="12" fill="#9fb0c7">No firing controls · shows cannons move, hides exact numbers</text>
  <text x="60" y="360" font-size="12" fill="#9fb0c7">Startup benchmark → effects tier · press M to mute</text>
  <circle cx="450" cy="384" r="12" fill="#5b8def"/>
  <text x="450" y="389" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <!-- ===================== Server ===================== -->
  <rect x="520" y="225" width="140" height="110" rx="10" fill="#2b3446" stroke="#566377" stroke-width="2"/>
  <text x="590" y="258" font-size="13" font-weight="700" fill="#e7ecf3" text-anchor="middle">Node server</text>
  <text x="590" y="278" font-size="10.5" fill="#aab6c6" text-anchor="middle">WebSocket rooms</text>
  <text x="590" y="294" font-size="10.5" fill="#aab6c6" text-anchor="middle">authoritative loop</text>
  <text x="590" y="310" font-size="10.5" fill="#aab6c6" text-anchor="middle">src/sim (Phaser-free)</text>
  <circle cx="642" cy="247" r="12" fill="#7a52d6"/>
  <text x="642" y="252" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <!-- arrows TV <-> server -->
  <line x1="470" y1="265" x2="518" y2="275" stroke="#7a52d6" stroke-width="2.5"/>
  <polygon points="470,265 484,264 480,274" fill="#7a52d6"/>
  <text x="476" y="244" font-size="10" fill="#7a52d6">snapshots</text>

  <!-- ===================== Phones ===================== -->
  <!-- helper: phone P1 -->
  <g>
    <rect x="700" y="95" width="150" height="150" rx="14" fill="#ffffff" stroke="#cfd6e0" stroke-width="2"/>
    <rect x="712" y="116" width="126" height="92" rx="4" fill="#dff0d8"/>
    <rect x="752" y="150" width="18" height="44" fill="#9b6b43"/>
    <path d="M740 150 L788 134" stroke="#5b3b22" stroke-width="3"/>
    <text x="775" y="200" font-size="9" fill="#5b3b22" text-anchor="middle">tower top</text>
    <rect x="712" y="214" width="74" height="14" rx="4" fill="#eef1f5" stroke="#cfd6e0"/>
    <rect x="794" y="214" width="44" height="14" rx="4" fill="#5aa84f"/>
    <text x="816" y="225" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">VALIDATE</text>
    <text x="708" y="110" font-size="11" font-weight="700" fill="#2c5fb8">P1 controller</text>
    <circle cx="836" cy="108" r="11" fill="#5aa84f"/>
    <text x="836" y="113" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  </g>
  <!-- phone P2 -->
  <g>
    <rect x="700" y="270" width="150" height="150" rx="14" fill="#ffffff" stroke="#cfd6e0" stroke-width="2"/>
    <rect x="712" y="291" width="126" height="92" rx="4" fill="#dff0d8"/>
    <rect x="752" y="325" width="18" height="44" fill="#9b6b43"/>
    <path d="M782 325 L734 311" stroke="#5b3b22" stroke-width="3"/>
    <text x="775" y="375" font-size="9" fill="#5b3b22" text-anchor="middle">tower top</text>
    <rect x="712" y="389" width="74" height="14" rx="4" fill="#eef1f5" stroke="#cfd6e0"/>
    <rect x="794" y="389" width="44" height="14" rx="4" fill="#5aa84f"/>
    <text x="816" y="400" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">VALIDATE</text>
    <text x="708" y="285" font-size="11" font-weight="700" fill="#b83a3a">P2 controller</text>
    <circle cx="836" cy="283" r="11" fill="#5aa84f"/>
    <text x="836" y="288" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  </g>
  <!-- phone P3 / Intendant (optional) -->
  <g>
    <rect x="700" y="445" width="150" height="150" rx="14" fill="#ffffff" stroke="#b9a3e0" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="712" y="466" width="126" height="92" rx="4" fill="#efe7fb"/>
    <circle cx="745" cy="512" r="16" fill="#fff" stroke="#7a52d6" stroke-width="2"/>
    <circle cx="745" cy="512" r="6" fill="#7a52d6"/>
    <rect x="788" y="498" width="42" height="14" rx="4" fill="#7a52d6"/>
    <text x="809" y="509" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">ACTION</text>
    <text x="788" y="534" font-size="8.5" fill="#5a4a86">tools · HP gauge</text>
    <text x="708" y="460" font-size="11" font-weight="700" fill="#6a45c2">P3 · Intendant (opt.)</text>
    <circle cx="836" cy="458" r="11" fill="#7a52d6"/>
    <text x="836" y="463" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  </g>

  <!-- arrows server <-> phones -->
  <line x1="660" y1="270" x2="698" y2="160" stroke="#5aa84f" stroke-width="2.5"/>
  <polygon points="698,160 686,166 692,172" fill="#5aa84f"/>
  <line x1="662" y1="300" x2="698" y2="335" stroke="#5aa84f" stroke-width="2.5"/>
  <polygon points="698,335 686,328 692,338" fill="#5aa84f"/>
  <line x1="660" y1="320" x2="698" y2="510" stroke="#7a52d6" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="698,510 686,504 690,516" fill="#7a52d6"/>
  <text x="612" y="360" font-size="10" fill="#5aa84f">intents</text>

  <!-- ===================== Legend ===================== -->
  <rect x="40" y="430" width="430" height="250" rx="8" fill="#ffffff" stroke="#cfd6e0"/>
  <text x="58" y="458" font-size="15" font-weight="700" fill="#1f2733">Legend</text>
  <g font-size="12.5" fill="#39424f">
    <circle cx="70" cy="486" r="11" fill="#5b8def"/>
    <text x="70" y="491" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="90" y="484" font-weight="700">TV / spectator screen</text>
    <text x="90" y="501">Renders the match (towers, terrain, soldiers) + the room</text>
    <text x="90" y="517">code &amp; QR. Never takes input, hides exact angle/power.</text>

    <circle cx="70" cy="546" r="11" fill="#7a52d6"/>
    <text x="70" y="551" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="90" y="544" font-weight="700">Node server</text>
    <text x="90" y="561">Holds the one true simulation (the Phaser-free src/sim);</text>
    <text x="90" y="577">broadcasts binary snapshots, accepts player intents.</text>

    <circle cx="70" cy="606" r="11" fill="#5aa84f"/>
    <text x="70" y="611" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="90" y="604" font-weight="700">Phone controllers (P1, P2)</text>
    <text x="90" y="621">Tower-top mini view + angle/power, then VALIDATE.</text>
    <text x="90" y="637">Both lock in, the volley fires together.</text>

    <circle cx="70" cy="662" r="11" fill="#7a52d6"/>
    <text x="70" y="667" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="90" y="666" font-weight="700">P3 · Intendant <tspan fill="#8a95a3" font-weight="400">— optional living battlefield (joystick + tools + ACTION)</tspan></text>
  </g>
</svg>
