<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Duel</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <meta name="theme-color" content="#0b1020" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b1020;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Anchor for the CRT band layers (snow / scanlines) injected by
           src/ui/screenFrame.js. The bands themselves stay "void" per the rule. */
        position: relative;
        background: #0b1020;
      }
      canvas {
        display: block;
      }
      /* Bezel: the 16:9 frame reads as a seated screen — a clean rim in native (at
         the window edge) and a frame against the bands otherwise. Only OUTSET
         shadows are kept: inset shadows sit under the opaque canvas bitmap and
         would never show. */
      #game canvas {
        border-radius: 3px;
        box-shadow:
          0 0 0 1px rgba(125, 160, 220, 0.22),
          0 0 0 4px rgba(11, 16, 32, 0.9),
          0 24px 80px 10px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
